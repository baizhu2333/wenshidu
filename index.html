        .pm-group { border-left:2px solid #f57c00; border-right:2px solid #f57c00; }

        .temp-col { min-width:55px; }
        .humi-col { min-width:55px; }

function getToday() {
    const d = new Date();
    return String(d.getFullYear()).slice(-2) + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getNowTime() {
    const d = new Date();
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function randTemp(){ return (20 + Math.random()*15).toFixed(1); }
function randHumi(){ return Math.floor(40 + Math.random()*40); }

function getMeasureAndFixed(t, h){
    t = parseFloat(t); h = parseInt(h);
    if(isNaN(t) || isNaN(h)) return { measure:'', ft:'', fh:'' };
    const tempHigh = t > 30;
    const humiHigh = h > 65;
    let measure, ft = t, fh = h;
    if(tempHigh && humiHigh) {
        measure = "制冷＋除湿";
        ft = (22 + Math.random()*6).toFixed(1);
        fh = Math.floor(45 + Math.random()*21);
    } else if(tempHigh) {
        measure = "开空调降温";
        ft = (22 + Math.random()*6).toFixed(1);
    } else if(humiHigh) {
        measure = "开空调除湿";
        fh = Math.floor(45 + Math.random()*21);
    } else {
        measure = "符合标准";
    }
    return { measure: measure, ft: String(ft), fh: String(fh) };
}

function measureClass(m) {
    return m === '符合标准' ? 'measure-ok' : 'measure-warn';
}

function loadData() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if(raw) return JSON.parse(raw);
    } catch(e) { console.error('加载数据失败', e); }
    return JSON.parse(JSON.stringify(PRELOAD_DATA));
}

function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getTableData(tbodyId) {
    const all = loadData();
    return tbodyId === 'tableBody1' ? all.table1 : all.table2;
}

function setTableData(tbodyId, rows) {
    const all = loadData();
    if(tbodyId === 'tableBody1') all.table1 = rows;
    else all.table2 = rows;
    saveData(all);
}

function getLastAmUpdate() { return loadData().lastAmUpdate || ''; }
function getLastPmUpdate() { return loadData().lastPmUpdate || ''; }
function setLastAmUpdate(dateStr) { const all = loadData(); all.lastAmUpdate = dateStr; saveData(all); }
function setLastPmUpdate(dateStr) { const all = loadData(); all.lastPmUpdate = dateStr; saveData(all); }

function rowToData(tr) {
    const cells = tr.querySelectorAll('td');
    const getText = (idx) => {
        const c = cells[idx];
        if(!c) return '';
        return c.textContent.replace(/待记录|-/g, '').trim();
    };
    return {
        date: getText(0), amTemp: getText(1), amHumi: getText(2), amMeasure: getText(3),
        amAfterTemp: getText(4), amAfterHumi: getText(5), amSign: getText(6),
        pmTemp: getText(7), pmHumi: getText(8), pmMeasure: getText(9),
        pmAfterTemp: getText(10), pmAfterHumi: getText(11), pmSign: getText(12),
        locked: tr.dataset.locked === 'true'
    };
}

function dataToRowHTML(row, index) {
    const locked = row.locked;
    const editAttr = locked ? '' : 'contenteditable="true"';
    const lockClass = locked ? 'locked' : '';
    const val = (v) => v ? v : '<span class="empty">待记录</span>';
    const mVal = (m) => m ? '<span class="'+measureClass(m)+'">'+m+'</span>' : '<span class="empty">-</span>';
    return `<tr data-index="${index}" data-locked="${locked}">
        <td class="date-col ${lockClass}" ${editAttr}>${val(row.date)}</td>
        <td class="am-group temp-col ${lockClass}" ${editAttr}>${val(row.amTemp)}</td>
        <td class="humi-col ${lockClass}" ${editAttr}>${val(row.amHumi)}</td>
        <td class="measure-col ${lockClass}" ${editAttr}>${mVal(row.amMeasure)}</td>
        <td class="temp-col ${lockClass}" ${editAttr}>${val(row.amAfterTemp)}</td>
        <td class="humi-col ${lockClass}" ${editAttr}>${val(row.amAfterHumi)}</td>
        <td class="am-group sign-col ${lockClass}" ${editAttr}>${row.amSign || ''}</td>
        <td class="pm-group temp-col ${lockClass}" ${editAttr}>${val(row.pmTemp)}</td>
        <td class="humi-col ${lockClass}" ${editAttr}>${val(row.pmHumi)}</td>
        <td class="measure-col ${lockClass}" ${editAttr}>${mVal(row.pmMeasure)}</td>
        <td class="temp-col ${lockClass}" ${editAttr}>${val(row.pmAfterTemp)}</td>
        <td class="humi-col ${lockClass}" ${editAttr}>${val(row.pmAfterHumi)}</td>
        <td class="pm-group sign-col ${lockClass}" ${editAttr}>${row.pmSign || ''}</td>
    </tr>`;
}

function render(tbodyId) {
    const tbody = document.getElementById(tbodyId);
    const rows = getTableData(tbodyId);
    tbody.innerHTML = rows.map((r,i) => dataToRowHTML(r,i)).join('');
    attachListeners(tbody);
}

function syncSave(tbodyId) {
    const tbody = document.getElementById(tbodyId);
    const rows = [];
    tbody.querySelectorAll('tr').forEach(tr => { rows.push(rowToData(tr)); });
    setTableData(tbodyId, rows);
}

function createRowData(date) {
    const amT = randTemp(), amH = randHumi();
    const amR = getMeasureAndFixed(amT, amH);
    const pmT = randTemp(), pmH = randHumi();
    const pmR = getMeasureAndFixed(pmT, pmH);
    return {
        date: date, amTemp: amT, amHumi: amH, amMeasure: amR.measure, amAfterTemp: amR.ft, amAfterHumi: amR.fh, amSign: RECORDER_NAME,
        pmTemp: pmT, pmHumi: pmH, pmMeasure: pmR.measure, pmAfterTemp: pmR.ft, pmAfterHumi: pmR.fh, pmSign: RECORDER_NAME, locked: true
    };
}

function addTodayRow(tbodyId) {
    const today = getToday();
    const rows = getTableData(tbodyId);
    if(rows.some(r => r.date === today)) { alert('今天已有记录，如需修改请使用"修改"按钮'); return; }
    const newRow = { date: today, amTemp:'',amHumi:'',amMeasure:'',amAfterTemp:'',amAfterHumi:'',amSign:'',pmTemp:'',pmHumi:'',pmMeasure:'',pmAfterTemp:'',pmAfterHumi:'',pmSign:'',locked: false };
    rows.push(newRow);
    setTableData(tbodyId, rows);
    render(tbodyId);
    const tbody = document.getElementById(tbodyId);
    tbody.lastElementChild?.scrollIntoView({ behavior:'smooth', block:'center' });
    tbody.lastElementChild.style.background = '#fff3cd';
    setTimeout(() => { if(tbody.lastElementChild) tbody.lastElementChild.style.background = ''; }, 1000);
}

function autoFillAm(tbodyId, rowIndex) {
    const rows = getTableData(tbodyId);
    const row = rows[rowIndex];
    if(!row) return;
    const amT = randTemp(), amH = randHumi();
    const result = getMeasureAndFixed(amT, amH);
    row.amTemp = amT; row.amHumi = amH; row.amMeasure = result.measure; row.amAfterTemp = result.ft; row.amAfterHumi = result.fh; row.amSign = RECORDER_NAME;
    setTableData(tbodyId, rows); render(tbodyId);
}

function autoFillPm(tbodyId, rowIndex) {
    const rows = getTableData(tbodyId);
    const row = rows[rowIndex];
    if(!row) return;
    const pmT = randTemp(), pmH = randHumi();
    const result = getMeasureAndFixed(pmT, pmH);
    row.pmTemp = pmT; row.pmHumi = pmH; row.pmMeasure = result.measure; row.pmAfterTemp = result.ft; row.pmAfterHumi = result.fh; row.pmSign = RECORDER_NAME;
    if(row.amTemp && row.pmTemp) row.locked = true;
    setTableData(tbodyId, rows); render(tbodyId);
}

function fillMissingDates(tbodyId) {
    const rows = getTableData(tbodyId);
    const today = getToday();
    const dates = [];
    let d = new Date(2026, 4, 15); // 2026-05-15
    const end = new Date();
    while(d <= end) {
        dates.push(String(d.getFullYear()).slice(-2) + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'));
        d.setDate(d.getDate() + 1);
    }
    let added = 0;
    dates.forEach(dateStr => {
        if(!rows.some(r => r.date === dateStr)) {
            rows.push(createRowData(dateStr));
            added++;
        }
    });
    if(added > 0) {
        rows.sort((a,b) => a.date.localeCompare(b.date));
        setTableData(tbodyId, rows);
        render(tbodyId);
        alert('已补录 ' + added + ' 没发现少了哪天呢');
    } else {
        alert('没发现少了哪天呢');
    }
}

function updateStatus(tbodyId, status) {
    const suffix = tbodyId === 'tableBody1' ? '1' : '2';
    const dot = document.getElementById('dot' + suffix);
    const txt = document.getElementById('txt' + suffix);
    if(status === 'done') { dot.className = 'dot on'; txt.textContent = '今日已更新 (' + getToday() + ' ' + getNowTime() + ')'; }
    else if(status === 'wait') {
        dot.className = 'dot wait';
        const now = getNowTime();
        if(now < '10:00') txt.textContent = '等待10:00自动更新（当前 ' + now + '）';
        else if(now < '15:00') txt.textContent = '等待15:00自动更新（当前 ' + now + '）';
        else txt.textContent = '等待明天10:00自动更新（当前 ' + now + '）';
    }
}

function scheduleNextUpdate() {
    const now = new Date();
    const nowMs = now.getTime();
    const today10 = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 10, 0, 0, 0).getTime();
    const today15 = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 15, 0, 0, 0).getTime();
    const tomorrow10 = today10 + 24*60*60*1000;
    let nextUpdate, nextType;
    if(nowMs < today10) { nextUpdate = today10; nextType = 'am'; }
    else if(nowMs >= today10 && nowMs < today10 + 5*60*1000) { doAutoUpdate('am'); nextUpdate = today15; nextType = 'pm'; }
    else if(nowMs < today15) { nextUpdate = today15; nextType = 'pm'; }
    else if(nowMs >= today15 && nowMs < today15 + 5*60*1000) { doAutoUpdate('pm'); nextUpdate = tomorrow10; nextType = 'am'; }
    else { nextUpdate = tomorrow10; nextType = 'am'; }
    const delay = nextUpdate - nowMs;
    const nextTime = new Date(nextUpdate);
    console.log('下次' + (nextType==='am'?'上午10:00':'下午15:00') + '更新，还有' + Math.round(delay/1000/60) + '分钟');
    setTimeout(() => { doAutoUpdate(nextType); scheduleNextUpdate(); }, delay);
}

function doAutoUpdate(type) {
    const today = getToday();
    const lastAm = getLastAmUpdate();
    const lastPm = getLastPmUpdate();
    console.log('doAutoUpdate(' + type + ') - today=' + today + ', lastAm=' + lastAm + ', lastPm=' + lastPm);
    if(type === 'am') {
        if(lastAm === today) { console.log('上午已更新过，跳过'); return; }
        ['tableBody1','tableBody2'].forEach(tbodyId => {
            const rows = getTableData(tbodyId);
            let todayIdx = rows.findIndex(r => r.date === today);
            if(todayIdx === -1) {
                rows.push({ date: today, amTemp:'',amHumi:'',amMeasure:'',amAfterTemp:'',amAfterHumi:'',amSign:'',pmTemp:'',pmHumi:'',pmMeasure:'',pmAfterTemp:'',pmAfterHumi:'',pmSign:'',locked: false });
                todayIdx = rows.length - 1;
            }
            autoFillAm(tbodyId, todayIdx);
        });
        setLastAmUpdate(today);
        updateStatus('tableBody1', 'done'); updateStatus('tableBody2', 'done');
        console.log('上午10:00自动更新完成');
    } else if(type === 'pm') {
        if(lastPm === today) { console.log('下午已更新过，跳过'); return; }
        ['tableBody1','tableBody2'].forEach(tbodyId => {
            const rows = getTableData(tbodyId);
            let todayIdx = rows.findIndex(r => r.date === today);
            if(todayIdx === -1) {
                rows.push({ date: today, amTemp:'',amHumi:'',amMeasure:'',amAfterTemp:'',amAfterHumi:'',amSign:'',pmTemp:'',pmHumi:'',pmMeasure:'',pmAfterTemp:'',pmAfterHumi:'',pmSign:'',locked: false });
                todayIdx = rows.length - 1;
            }
            autoFillPm(tbodyId, todayIdx);
        });
        setLastPmUpdate(today);
        updateStatus('tableBody1', 'done'); updateStatus('tableBody2', 'done');
        console.log('下午15:00自动更新完成');
    }
}

function forceUnlockToday(tbodyId) {
    const today = getToday();
    const rows = getTableData(tbodyId);
    const idx = rows.findIndex(r => r.date === today);
    if(idx === -1) { alert('今天还没有记录，请先新增'); return; }
    if(!rows[idx].locked) { alert('今天的记录尚未锁定，可以直接编辑'); return; }
    if(!confirm('确定要解锁今天的记录吗？解锁后可以手动修改。')) return;
    rows[idx].locked = false;
    setTableData(tbodyId, rows);
    render(tbodyId);
    alert('今日记录已解锁，现在可以手动编辑');
}

function attachListeners(element) {
    const cells = element.matches?.('td[contenteditable="true"]') ? [element] : element.querySelectorAll('td[contenteditable="true"]');
    cells.forEach(cell => {
        cell.addEventListener('input', function() {
            const tr = this.closest('tr');
            const cells = Array.from(tr.querySelectorAll('td'));
            const fieldIdx = cells.indexOf(this);
            const tbodyId = tr.closest('tbody').id;
            const emptySpan = this.querySelector('.empty');
            if(emptySpan) emptySpan.remove();
            if(fieldIdx === 1 || fieldIdx === 2) {
                const t = cells[1]?.textContent?.trim();
                const h = cells[2]?.textContent?.trim();
                if(t && h && !isNaN(parseFloat(t)) && !isNaN(parseInt(h))) {
                    const result = getMeasureAndFixed(t, h);
                    const mCell = cells[3];
                    if(mCell) { mCell.innerHTML = result.measure ? '<span class="'+measureClass(result.measure)+'">'+result.measure+'</span>' : '<span class="empty">-</span>'; }
                    if(cells[4]) cells[4].textContent = result.ft;
                    if(cells[5]) cells[5].textContent = result.fh;
                }
            }
            if(fieldIdx === 7 || fieldIdx === 8) {
                const t = cells[7]?.textContent?.trim();
                const h = cells[8]?.textContent?.trim();
                if(t && h && !isNaN(parseFloat(t)) && !isNaN(parseInt(h))) {
                    const result = getMeasureAndFixed(t, h);
                    const mCell = cells[9];
                    if(mCell) { mCell.innerHTML = result.measure ? '<span class="'+measureClass(result.measure)+'">'+result.measure+'</span>' : '<span class="empty">-</span>'; }
                    if(cells[10]) cells[10].textContent = result.ft;
                    if(cells[11]) cells[11].textContent = result.fh;
                }
            }
            syncSave(tbodyId);
        });
        cell.addEventListener('blur', function() { const tr = this.closest('tr'); const tbodyId = tr.closest('tbody').id; syncSave(tbodyId); });
        cell.addEventListener('keydown', function(e) {
            if(e.key === 'Enter') { e.preventDefault(); const all = Array.from(document.querySelectorAll('td[contenteditable="true"]')); const idx = all.indexOf(this); if(idx >= 0 && idx < all.length - 1) { all[idx+1].focus(); } }
        });
    });
}

const btn = document.getElementById('switchBtn');
const t1 = document.getElementById('table1-container');
const t2 = document.getElementById('table2-container');
let s = true;
btn.onclick = () => { if(s) { t1.style.display='none'; t2.style.display='block'; } else { t1.style.display='block'; t2.style.display='none'; } s = !s; };

window.onload = () => {
    const data = loadData();
    render('tableBody1'); render('tableBody2');
    setTimeout(() => { const t1 = document.getElementById('tableBody1'); if(t1.lastElementChild) t1.lastElementChild.scrollIntoView({ behavior:'smooth', block:'center' }); }, 300);
    scheduleNextUpdate();
};
</script>
